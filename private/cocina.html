<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS Cocina/Barra | La Esquina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Motor Base Oscuro -->
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="/logo.png">
    
    <style>
        /* Estilos KDS Optimizados para Pantalla Táctil/Tablet */
        body { background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        .kds-header { background: #111; border-bottom: 3px solid #ff4757; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .kds-title { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 1px; margin: 0;}
        .kds-clock { font-size: 20px; font-weight: 700; color: #aaa; font-variant-numeric: tabular-nums; }
        
        /* Contenedor de Comandas */
        .comandas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; align-items: start;}
        
        /* Tarjeta de Pedido (Comanda) */
        .comanda-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cabecera de la Comanda (Rojo para alerta) */
        .comanda-header { background: #ff4757; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .mesa-numero { font-size: 28px; font-weight: 900; }
        .tiempo-pedido { font-size: 16px; font-weight: 700; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 6px; }
        
        /* Lista de Productos */
        .comanda-body { padding: 0; background: #fff; }
        .producto-item { 
            padding: 15px 20px; 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            align-items: center; 
            color: #000;
            font-size: 20px;
            font-weight: 700;
        }
        .producto-item:last-child { border-bottom: none; }
        
        .cantidad-badge { 
            background: #000; 
            color: #fff; 
            font-size: 22px; 
            font-weight: 900; 
            min-width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 8px; 
            margin-right: 15px; 
        }

        .producto-nombre { flex-grow: 1; line-height: 1.2; }
        .producto-categoria { display: block; font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; margin-top: 4px;}

        /* Botón de Despacho */
        .btn-despachar { 
            width: 100%; 
            padding: 15px; 
            font-size: 20px; 
            font-weight: 800; 
            border: none; 
            background: #25D366; 
            color: black; 
            text-transform: uppercase;
            transition: background 0.2s;
            cursor: pointer;
        }
        .btn-despachar:active { background: #1da851; }

        /* Estado Vacío */
        .empty-state { text-align: center; padding: 100px 20px; color: #555; grid-column: 1 / -1; }
        .empty-icon { font-size: 80px; margin-bottom: 20px; opacity: 0.5; }
    </style>
</head>
<body>

    <!-- Sonido de Alerta (Campana) -->
    <audio id="campana" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <!-- Barra Superior -->
    <header class="kds-header">
        <h1 class="kds-title">👨‍🍳 KDS | LA ESQUINA</h1>
        <div class="d-flex align-items-center gap-4">
            <div class="kds-clock" id="reloj">00:00:00</div>
            <button class="btn btn-outline-light btn-sm" onclick="probarSonido()">🔊 Probar Sonido</button>
            <a href="/logout" class="btn btn-danger btn-sm fw-bold">Salir</a>
        </div>
    </header>

    <!-- Contenedor Principal de Pedidos -->
    <main class="comandas-grid" id="contenedor-kds">
        <div class="empty-state">
            <div class="empty-icon">🍽️</div>
            <h2>SIN PEDIDOS PENDIENTES</h2>
            <p>La cocina y la barra están al día.</p>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Reloj en tiempo real
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-PE');
        }, 1000);

        // Variables de Control
        let cantidadPedidosAnteriores = 0;
        const sonidoCampana = document.getElementById('campana');

        function probarSonido() {
            sonidoCampana.play().catch(e => alert("Tu navegador bloquea el sonido automático. Haz clic aquí una vez para habilitarlo."));
        }

        // Conexión WebSockets
        const socket = io();
        socket.on('actualizar_cocina', () => cargarKDS());
        socket.on('campana_cocina', () => {
            sonidoCampana.currentTime = 0;
            sonidoCampana.play().catch(e => console.log("Sonido bloqueado por el navegador", e));
        });

        // Agrupar pedidos por Mesa
        function agruparPorMesa(pedidos) {
            const agrupado = {};
            pedidos.forEach(p => {
                if (!agrupado[p.numero_mesa]) {
                    agrupado[p.numero_mesa] = {
                        mesa: p.numero_mesa,
                        horaMinima: p.hora, // Tomamos la hora del pedido más antiguo
                        items: []
                    };
                }
                agrupado[p.numero_mesa].items.push(p);
            });
            // Convertir a Array y ordenar por número de mesa
            return Object.values(agrupado).sort((a, b) => a.mesa - b.mesa);
        }

        async function cargarKDS() {
            try {
                const res = await fetch('/api/kds/pendientes');
                const pedidosRaw = await res.json();
                
                const contenedor = document.getElementById('contenedor-kds');
                contenedor.innerHTML = '';

                // Si no hay pedidos
                if (pedidosRaw.length === 0) {
                    cantidadPedidosAnteriores = 0;
                    contenedor.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">✅</div>
                            <h2>TODO DESPACHADO</h2>
                            <p>Esperando nuevas órdenes...</p>
                        </div>
                    `;
                    return;
                }

                // Agrupamos la data cruda en bloques por mesa
                const comandas = agruparPorMesa(pedidosRaw);

                // Pintar cada comanda (Tarjeta)
                comandas.forEach(comanda => {
                    let itemsHtml = '';
                    
                    // Pintar los productos dentro de la comanda
                    comanda.items.forEach(item => {
                        let cat = item.categoria ? item.categoria.toUpperCase() : 'GENERAL';
                        let colorCat = cat.includes('CERVEZA') || cat.includes('TRAGO') ? 'color: #0dcaf0;' : 'color: #ff4757;';

                        itemsHtml += `
                            <div class="producto-item">
                                <div class="cantidad-badge">${item.cantidad}</div>
                                <div class="producto-nombre">
                                    ${item.nombre}
                                    <span class="producto-categoria" style="${colorCat}">${cat}</span>
                                </div>
                                <button class="btn btn-sm btn-outline-secondary px-3 py-2 fw-bold" onclick="marcarEntregado(${item.id})">✔️</button>
                            </div>
                        `;
                    });

                    // Construir la tarjeta completa
                    contenedor.innerHTML += `
                        <div class="comanda-card">
                            <div class="comanda-header">
                                <div class="mesa-numero">Mesa ${comanda.mesa}</div>
                                <div class="tiempo-pedido">⏱️ ${comanda.horaMinima}</div>
                            </div>
                            <div class="comanda-body">
                                ${itemsHtml}
                            </div>
                            <button class="btn-despachar" onclick="despacharMesa Completa(${comanda.mesa})">
                                🛎️ DESPACHAR TODO
                            </button>
                        </div>
                    `;
                });

                // Actualizar contador para evitar que suene la campana si solo recargó la página
                cantidadPedidosAnteriores = pedidosRaw.length;

            } catch (error) {
                console.error("Error cargando KDS:", error);
            }
        }

        // Marcar un solo producto como entregado
        async function marcarEntregado(idPedido) {
            try {
                await fetch(`/api/kds/entregar/${idPedido}`, { method: 'POST' });
                // El WebSocket de tu server avisará a todos que recarguen
            } catch (e) { alert("Error al entregar pedido"); }
        }

        // (Opcional Futuro) Despachar toda la mesa de golpe
        function despacharMesaCompleta(numeroMesa) {
            alert(`Función en desarrollo. Por ahora, marca con ✔️ cada producto de la Mesa ${numeroMesa}.`);
        }

        // Iniciar
        cargarKDS();

        // Autorefresco por si el WebSocket falla
        setInterval(cargarKDS, 10000); 
    </script>
</body>
</html>
