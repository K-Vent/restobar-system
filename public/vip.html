<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal VIP | La Esquina del Billar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #FFDF73;
            --dark-bg: #0a0a0c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: radial-gradient(circle at top center, #1a1a20 0%, #000000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Ambient Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(212, 175, 55, 0.2); top: -100px; left: -100px; animation: float 10s infinite ease-in-out alternate; }
        .orb-2 { width: 250px; height: 250px; background: rgba(255, 255, 255, 0.1); bottom: -50px; right: -50px; animation: float 8s infinite ease-in-out alternate-reverse; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-logo img {
            width: 130px;
            drop-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: pulseLogo 3s infinite alternate ease-in-out;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(212,175,55,0.2)); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 15px rgba(212,175,55,0.5)); }
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: 12px;
            text-align: center;
            letter-spacing: 3px;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        .btn-gold {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #9a7d25);
            color: black;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-gold::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg) translate(-100%, -100%);
            transition: all 0.5s ease;
        }

        .btn-gold:hover::after {
            transform: rotate(45deg) translate(100%, 100%);
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgba(212, 175, 55, 0.6);
        }

        /* VIP Card Design */
        .vip-card {
            background: linear-gradient(135deg, #111, #222);
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: none;
            text-align: left;
            animation: cardEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }

        .hologram-seal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ffeb99, #d4af37);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(212,175,55,0.5);
            animation: spin 10s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .vip-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .vip-level {
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stamp-box {
            aspect-ratio: 1;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .stamp-box.filled {
            border: 2px solid var(--gold);
            background: rgba(212,175,55,0.1);
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .qr-box {
            text-align: center;
            margin-top: 20px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .recompensa-alert {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #4ade80;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            margin-top: 15px;
            animation: pulseGreen 2s infinite;
        }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.1);
        }

    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        
        <div class="header-logo">
            <img src="/logo.png" alt="La Esquina del Billar">
        </div>

        <!-- Login Form -->
        <div class="glass-panel" id="loginPanel">
            <h1 class="title">Socio VIP</h1>
            <p class="subtitle">Ingresa tu número de DNI para acceder a tus beneficios</p>
            
            <form id="vipForm">
                <div class="input-group">
                    <input type="tel" id="dniInput" placeholder="N° DE DNI" required maxlength="12" autocomplete="off">
                </div>
                <button type="submit" class="btn-gold" id="btnIngresar">
                    ACCEDER AHORA ✨
                </button>
                <div class="error-msg" id="errorMsg">DNI no encontrado o error en el sistema.</div>
            </form>
        </div>

        <!-- Tarjeta VIP -->
        <div class="vip-card" id="vipCard">
            <div class="card-glare"></div>
            <div class="hologram-seal">👑</div>
            
            <div class="vip-name" id="sNombre">Cargando...</div>
            <div class="vip-level" id="sNivel">👑 Socio Plata</div>
            
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">Progreso para la siguiente recompensa:</p>
            <div class="stamps-grid" id="stampsGrid">
                <!-- Se llenan con JS -->
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div class="qr-box">
                    <img id="qrImg" src="" alt="QR Socio" style="width: 100px; height: 100px;">
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 0.75rem; color: #aaa;">ID SOCIO</div>
                    <div style="font-weight: 800; font-family: monospace; font-size: 1.1rem; color: var(--gold);" id="sId">0000</div>
                </div>
            </div>

            <div id="recompensaBox" style="display: none;">
                <div class="recompensa-alert">
                    🎁 ¡Tienes <span id="sRecompensas">1</span> Hora Gratis Disponible!
                </div>
                <p style="font-size: 0.75rem; color: #aaa; text-align: center; margin-top: 10px;">Muéstrale este QR a la caja para canjear tu premio.</p>
            </div>

            <div style="text-align: center;">
                <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
            </div>
        </div>

    </div>

    <!-- Cargar librería QRCode para generar el QR dinámicamente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        const form = document.getElementById('vipForm');
        const loginPanel = document.getElementById('loginPanel');
        const vipCard = document.getElementById('vipCard');
        const btnIngresar = document.getElementById('btnIngresar');
        const errorMsg = document.getElementById('errorMsg');

        // Si ya hay un DNI guardado en el celular, cargar automático
        document.addEventListener('DOMContentLoaded', () => {
            const savedDni = localStorage.getItem('vip_dni');
            if (savedDni) {
                document.getElementById('dniInput').value = savedDni;
                form.dispatchEvent(new Event('submit'));
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const dni = document.getElementById('dniInput').value.trim();
            
            if (!dni) return;

            btnIngresar.innerText = 'VERIFICANDO...';
            btnIngresar.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // Hacer petición a nuestra API real
                const res = await fetch(`/api/vip/verificar/${dni}`);
                const data = await res.json();

                if (res.ok) {
                    // Guardar DNI para futuras visitas
                    localStorage.setItem('vip_dni', dni);
                    mostrarTarjeta(data);
                } else {
                    mostrarError(data.error || 'DNI no registrado.');
                }
            } catch (err) {
                mostrarError('Error de conexión.');
            }

            btnIngresar.innerText = 'ACCEDER AHORA ✨';
            btnIngresar.disabled = false;
        });

        function mostrarError(msg) {
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
        }

        function mostrarTarjeta(data) {
            loginPanel.style.display = 'none';
            vipCard.style.display = 'block';

            document.getElementById('sNombre').innerText = data.nombre;
            document.getElementById('sId').innerText = data.id.toString().padStart(4, '0');
            
            // Asignar el nivel
            let iconoNivel = '🥉';
            if(data.nivel.includes('Oro')) iconoNivel = '👑';
            if(data.nivel.includes('Plata')) iconoNivel = '🥈';
            document.getElementById('sNivel').innerText = `${iconoNivel} Socio ${data.nivel}`;

            // Calcular sellos actuales (módulo de 10)
            const sellos = data.sellos % 10;
            const recompensas = Math.floor(data.sellos / 10) - data.canjes;

            dibujarSellos(sellos);

            // Generar QR Dinámico
            const qrContainer = document.getElementById('qrImg');
            // Como usamos un tag img, lo reemplazaremos por el contenedor de qrcode
            qrContainer.outerHTML = '<div id="qrCodeDiv"></div>';
            new QRCode(document.getElementById("qrCodeDiv"), {
                text: data.id.toString(),
                width: 100,
                height: 100,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // Mostrar recompensa si la hay
            if (recompensas > 0) {
                document.getElementById('recompensaBox').style.display = 'block';
                document.getElementById('sRecompensas').innerText = recompensas;
                lanzarConfeti();
            } else {
                document.getElementById('recompensaBox').style.display = 'none';
            }
        }

        function dibujarSellos(cantidad) {
            const grid = document.getElementById('stampsGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const box = document.createElement('div');
                if (i <= cantidad) {
                    box.className = 'stamp-box filled';
                    box.innerText = '🎱';
                    box.style.animationDelay = `${i * 0.05}s`;
                } else {
                    box.className = 'stamp-box';
                    // Dejar vacío
                }
                grid.appendChild(box);
            }
        }

        function lanzarConfeti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#D4AF37', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#D4AF37', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function cerrarSesion() {
            localStorage.removeItem('vip_dni');
            location.reload();
        }
    </script>
</body>
</html>
