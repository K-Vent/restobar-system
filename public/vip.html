<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VIP | La Esquina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ═══════════════════════════════════════════════
           CSS CUSTOM PROPERTIES
        ═══════════════════════════════════════════════ */
        :root {
            --bg-main: #09090b;
            --bg-surface: #18181b;
            --bg-elevated: #27272a;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --primary: #B8973E;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 6px;
        }

        /* ═══════════════════════════════════════════════
           RESET & BASE
        ═══════════════════════════════════════════════ */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ═══════════════════════════════════════════════
           WALLET CARD
        ═══════════════════════════════════════════════ */
        .wallet-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            padding: 0 30px 40px 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: opacity 0.2s linear;
        }

        /* ═══════════════════════════════════════════════
           HEADER
        ═══════════════════════════════════════════════ */
        .header {
            position: relative;
            z-index: 1;
            padding-top: 40px;
        }

        .logo-text {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sub-text {
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* ═══════════════════════════════════════════════
           LOGIN SECTION
        ═══════════════════════════════════════════════ */
        #login-section {
            position: relative;
            z-index: 1;
            transition: opacity 0.2s linear, transform 0.2s linear;
        }

        #login-section.hiding {
            opacity: 0;
            transform: translateY(-10px);
        }

        #card-section {
            position: relative;
            z-index: 1;
        }

        #card-section.showing {
            animation: sectionFadeSlideIn 0.2s linear forwards;
        }

        @keyframes sectionFadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════════════
           INPUT STYLES
        ═══════════════════════════════════════════════ */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-vip {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px 18px;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s linear;
        }

        .input-vip:focus {
            border-color: var(--primary);
        }

        .input-vip::placeholder {
            color: var(--text-muted);
        }

        input[type="password"].input-vip {
            letter-spacing: 12px;
            text-align: center;
            font-size: 22px;
        }

        /* ═══════════════════════════════════════════════
           BUTTON
        ═══════════════════════════════════════════════ */
        .btn-vip {
            background: var(--primary);
            color: #09090b;
            font-weight: 600;
            font-size: 15px;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s linear;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-vip:hover {
            background-color: #a18334;
        }

        /* ═══════════════════════════════════════════════
           CLIENT INFO CARD
        ═══════════════════════════════════════════════ */
        .client-info {
            background: var(--bg-main);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .client-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .client-level {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: transparent;
            border: none;
        }

        /* ═══════════════════════════════════════════════
           QR CONTAINER
        ═══════════════════════════════════════════════ */
        .qr-container {
            background: #fff;
            padding: 10px;
            border-radius: var(--radius);
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .qr-container img {
            display: block;
            width: 160px;
            height: 160px;
            border-radius: 2px;
        }

        /* ═══════════════════════════════════════════════
           STAMPS GRID
        ═══════════════════════════════════════════════ */
        .stamps-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stamp-slot {
            aspect-ratio: 1;
            border-radius: var(--radius);
            border: 1px dashed var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: transparent;
            background: var(--bg-main);
        }

        .stamp-filled {
            border: 1px solid var(--border);
            color: var(--primary);
            background: var(--bg-main);
        }

        /* ═══════════════════════════════════════════════
           PROGRESS BAR
        ═══════════════════════════════════════════════ */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: var(--bg-elevated);
            border-radius: 2px;
            margin-top: 14px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            transition: width 0.2s linear;
        }

        .progress-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ═══════════════════════════════════════════════
           REWARDS SECTION
        ═══════════════════════════════════════════════ */
        .rewards-box {
            background: var(--bg-main);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .rewards-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .rewards-title {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .rewards-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .btn-benefits {
            margin-bottom: 20px;
            font-size: 12px;
            padding: 10px;
            border: 1px solid var(--border);
            background: var(--bg-main) !important;
            color: var(--text-main) !important;
            border-radius: var(--radius);
            transition: background-color 0.2s linear;
        }

        .btn-benefits:hover {
            background-color: var(--bg-elevated) !important;
        }

        /* ═══════════════════════════════════════════════
           BENEFITS MODAL
        ═══════════════════════════════════════════════ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(9, 9, 11, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            width: 100%;
            max-width: 370px;
            text-align: left;
        }

        .modal-title {
            color: var(--text-main);
            text-align: center;
            margin-bottom: 24px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ═══════════════════════════════════════════════
           ERROR MESSAGE
        ═══════════════════════════════════════════════ */
        .msg-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 15px;
            font-weight: 500;
            display: none;
            padding: 12px;
            background: var(--bg-main);
            border-radius: var(--radius);
            border: 1px solid var(--danger);
        }

        /* ═══════════════════════════════════════════════
           PROGRESS TITLE
        ═══════════════════════════════════════════════ */
        .progress-title {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* ═══════════════════════════════════════════════
           LOGOUT LINK
        ═══════════════════════════════════════════════ */
        .logout-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: color 0.2s linear;
        }
        .logout-link:hover {
            color: var(--text-main);
        }

        /* ═══════════════════════════════════════════════
           PREMIOS HIGHLIGHT
        ═══════════════════════════════════════════════ */
        .premios-count {
            color: var(--text-main);
            font-weight: 700;
            font-size: 14px;
        }

        .premios-count.has-premios {
            color: var(--primary);
        }

        /* ═══════════════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════════════ */
        @media (max-width: 420px) {
            .wallet-card { padding: 0 20px 30px 20px; }
            .logo-text { font-size: 20px; }
            .stamps-grid { gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="wallet-card">
        <div class="header">
            <div class="logo-text"><i data-lucide="crown"></i> LA ESQUINA</div>
            <div class="sub-text" id="header-sub">Portal de Socios VIP</div>
        </div>

        <div id="login-section">
            <div class="input-group">
                <label>Teléfono Registrado</label>
                <input type="tel" id="in-tel" class="input-vip" placeholder="Ingresa tu celular">
            </div>
            <div class="input-group">
                <label>PIN de Seguridad</label>
                <input type="password" id="in-pin" class="input-vip" placeholder="• • • •" maxlength="4">
            </div>
            <button class="btn-vip" onclick="iniciarSesionVIP()">Acceder a mi Tarjeta</button>
            <div class="msg-error" id="msg-error">Datos incorrectos. Intenta nuevamente.</div>
        </div>

        <div id="card-section" style="display: none;">
            <div class="client-info">
                <div class="client-name" id="lbl-nombre">Cargando...</div>
                <div class="client-level" id="lbl-nivel">Cargando...</div>
            </div>

            <div class="qr-container">
                <img id="qr-image" src="" alt="Código QR VIP">
            </div>

            <div class="rewards-box">
                <div class="rewards-label">Tu Recompensa Actual</div>
                <br>
                <button class="btn-vip btn-benefits" onclick="mostrarBeneficiosCliente()"><i data-lucide="gem" style="width:16px;height:16px;"></i> Ver Mis Beneficios</button>

            <div id="modal-ben-cliente" class="modal-overlay">
                <div class="modal-content">
                    <h3 class="modal-title">Tus Beneficios</h3>
                    <div id="lista-ben-cliente" style="margin-bottom: 25px;">
                    </div>
                    <button class="btn-vip" onclick="document.getElementById('modal-ben-cliente').style.display='none'">Cerrar</button>
                </div>
            </div>
                <div class="rewards-title"><i data-lucide="circle-play" style="width:18px;height:18px;"></i> 1 Hora de Billar Gratis</div>
                <div class="rewards-sub">Premios disponibles: <span id="lbl-premios" class="premios-count">0</span></div>
            </div>

            <div class="progress-title">Progreso de Visitas</div>
            <div class="stamps-grid" id="stamps-container"></div>
            
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-fill" style="width: 0%;"></div>
            </div>
            <div class="progress-label" id="progress-label">0 / 10 visitas</div>

            <div style="margin-top: 20px; font-size: 12px;">
                <a href="#" onclick="cerrarSesionVIP()" class="logout-link">Cerrar sesión</a>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════
        //  ORIGINAL VIP LOGIC — 100% PRESERVED
        // ═══════════════════════════════════════════════
        async function mostrarBeneficiosCliente() {
            const textoNivel = document.getElementById('lbl-nivel').innerText.toLowerCase();
            let poderNivel = 1; 
            if (textoNivel.includes('plata')) poderNivel = 2;
            if (textoNivel.includes('oro')) poderNivel = 3;

            try {
                const res = await fetch('/api/beneficios');
                const beneficiosBD = await res.json();
                
                const contenedor = document.getElementById('lista-ben-cliente');
                contenedor.innerHTML = '';

                let encontrados = 0;
                beneficiosBD.forEach(b => {
                    let reqNivel = 1;
                    if (b.nivel === 'Plata') reqNivel = 2;
                    if (b.nivel === 'Oro') reqNivel = 3;

                    if (poderNivel >= reqNivel) {
                        encontrados++;
                        contenedor.innerHTML += `
                            <div style="background: var(--bg-main); border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; border-radius: var(--radius);">
                                <div style="color: var(--primary); font-size: 11px; font-weight: 600; text-transform: uppercase;">Beneficio ${b.nivel}</div>
                                <div style="color: var(--text-main); font-size: 14px; margin-top: 4px;">${b.descripcion}</div>
                            </div>
                        `;
                    }
                });

                if(encontrados === 0) {
                    contenedor.innerHTML = `<div style="color: var(--text-muted); text-align: center; font-size: 14px;">Aún no hay beneficios configurados para tu nivel. ¡Sigue acumulando sellos!</div>`;
                }

                document.getElementById('modal-ben-cliente').style.display = 'flex';
            } catch (e) { alert("Error al cargar beneficios"); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const credenciales = localStorage.getItem('vip_esquina');
            if(credenciales) {
                const { telefono, pin } = JSON.parse(credenciales);
                ejecutarLogin(telefono, pin);
            }
            lucide.createIcons();
        });

        function iniciarSesionVIP() {
            const tel = document.getElementById('in-tel').value.trim();
            const pin = document.getElementById('in-pin').value.trim();
            if(!tel || !pin) return alert("Completa tus datos");
            ejecutarLogin(tel, pin);
        }

        async function ejecutarLogin(telefono, pin) {
            document.getElementById('msg-error').style.display = 'none';
            try {
                const res = await fetch('/api/vip/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telefono, pin })
                });

                if (!res.ok) {
                    document.getElementById('msg-error').style.display = 'block';
                    localStorage.removeItem('vip_esquina');
                    return;
                }

                const data = await res.json();
                
                localStorage.setItem('vip_esquina', JSON.stringify({ telefono, pin }));

                const loginSection = document.getElementById('login-section');
                loginSection.classList.add('hiding');
                setTimeout(() => {
                    loginSection.style.display = 'none';
                    document.getElementById('header-sub').innerText = "Tarjeta Digital Activa";
                    const cardSection = document.getElementById('card-section');
                    cardSection.style.display = 'block';
                    cardSection.classList.add('showing');
                }, 200);

                document.getElementById('lbl-nombre').innerText = data.nombre;
                
                const badge = document.getElementById('lbl-nivel');
                badge.innerText = `[ ${data.nivel.toUpperCase()} ]`;
                badge.className = 'client-level'; 

                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=socio-${data.id}`;

                const container = document.getElementById('stamps-container');
                container.innerHTML = '';
                let sellosVisuales = data.sellos % 10;
                if (data.sellos > 0 && sellosVisuales === 0) sellosVisuales = 10; 
                
                const premiosGanados = Math.floor(data.sellos / 10) - (data.premios_canjeados || 0);
                document.getElementById('lbl-premios').innerText = premiosGanados;
                for (let i = 1; i <= 10; i++) {
                    if (i <= sellosVisuales) container.innerHTML += `<div class="stamp-slot stamp-filled"><i data-lucide="check" style="width:20px;height:20px;"></i></div>`;
                    else container.innerHTML += `<div class="stamp-slot"></div>`;
                }

                lucide.createIcons();

                const progressPct = (sellosVisuales / 10) * 100;
                setTimeout(() => {
                    document.getElementById('progress-fill').style.width = progressPct + '%';
                    document.getElementById('progress-label').innerText = sellosVisuales + ' / 10 visitas';
                }, 300);

                const premiosEl = document.getElementById('lbl-premios');
                if (premiosGanados > 0) {
                    premiosEl.classList.add('has-premios');
                } else {
                    premiosEl.classList.remove('has-premios');
                }

            } catch (error) {
                alert("Error de conexión");
            }
        }

        function cerrarSesionVIP() {
            localStorage.removeItem('vip_esquina');
            location.reload();
        }
    </script>
</body>
</html>
