<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditoría de Seguridad | La Esquina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="icon" href="/logo.png">
</head>
<body class="text-light">
    
    <div id="overlay-sidebar" class="overlay-mobile" onclick="cerrarMenuMovil()"></div>

    <nav class="sidebar">
        <div class="text-center mb-4">
            <img src="/logo.png" style="max-width: 150px;" alt="La Esquina">
        </div>
        
        <div class="d-flex flex-column flex-grow-1 mt-3">
            <a href="/dashboard.html" class="nav-item-vip">🎱 Control de Mesas</a>
            <a href="/cocina.html" class="nav-item-vip" target="_blank">👨‍🍳 Pantalla Cocina</a>
            <a href="/inventario.html" class="nav-item-vip">📦 Inventario</a>
            <a href="/clientes.html" class="nav-item-vip">👑 Club La Esquina</a>
            <a href="/reportes.html" class="nav-item-vip">📈 Analytics (BI)</a>
            <a href="/cierre_caja.html" class="nav-item-vip">🔒 Cerrar Caja</a>
            <a href="/auditoria.html" class="nav-item-vip active text-danger" style="border-left-color: #dc3545;">🕵️‍♂️ Auditoría</a> <a href="/empleados.html" class="nav-item-vip">👥 Empleados</a>
        </div>
        
        <a href="/logout" class="btn-logout-sidebar mt-4">🚪 CERRAR SESIÓN</a>
    </nav>

    <main class="main-content" style="padding: 30px;">
        
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3 border-bottom pb-3" style="border-color: rgba(220, 53, 69, 0.3) !important;">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-danger d-md-none shadow-sm fw-bold px-3 py-2 text-white" onclick="abrirMenuMovil()">
                    ☰ MENÚ
                </button>
                <div>
                    <h4 class="fw-bold mb-0 text-white" style="letter-spacing: 1px;">🕵️‍♂️ Registro de Auditoría</h4>
                    <small class="text-muted">Monitoreo de acciones críticas del personal en tiempo real.</small>
                </div>
            </div>
            
            <div class="d-flex gap-3 flex-wrap align-items-center">
                <input type="text" id="buscador" class="form-control bg-dark text-white border-secondary shadow-sm" 
                       placeholder="🔍 Buscar empleado o acción..." style="width: 300px;" onkeyup="filtrarAuditoria()">
                
                <button class="btn btn-outline-light fw-bold shadow-sm px-4 opacity-75" onclick="cargarAuditoria()">
                    🔄 ACTUALIZAR
                </button>
            </div>
        </div>

        <div class="card bg-dark shadow-lg" style="border-radius: 12px; overflow: hidden; border: 1px solid #333;">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0 align-middle" style="border-collapse: separate; border-spacing: 0;">
                        <thead style="background: linear-gradient(145deg, #1a0b0b, #050505);">
                            <tr>
                                <th class="py-3 px-4 text-danger" style="border-bottom: 2px solid #dc3545;">FECHA Y HORA</th>
                                <th class="py-3 px-4 text-danger" style="border-bottom: 2px solid #dc3545;">EMPLEADO</th>
                                <th class="py-3 px-4 text-danger" style="border-bottom: 2px solid #dc3545;">TIPO DE ACCIÓN</th>
                                <th class="py-3 px-4 text-danger" style="border-bottom: 2px solid #dc3545; width: 40%;">DETALLES DEL EVENTO</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-auditoria">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        let listaAuditoria = [];

        function abrirMenuMovil() {
            document.querySelector('.sidebar').classList.add('abierto-movil');
            document.getElementById('overlay-sidebar').classList.add('activo');
        }
        function cerrarMenuMovil() {
            document.querySelector('.sidebar').classList.remove('abierto-movil');
            document.getElementById('overlay-sidebar').classList.remove('activo');
        }

        async function cargarAuditoria() {
            try {
                const res = await fetch('/api/auditoria');
                const data = await res.json();
                
                // Si la respuesta es OK y es una lista, pintamos la tabla
                if (res.ok && Array.isArray(data)) {
                    listaAuditoria = data;
                    pintarTabla(listaAuditoria);
                } else {
                    // Si hay Error 500, mostramos el error sin romper la página
                    document.getElementById('tabla-auditoria').innerHTML = `
                        <tr><td colspan="4" class="text-center py-4 text-danger fw-bold">
                            ⚠️ Error del servidor: ${data.error || 'La tabla de auditoría se está inicializando...'}
                        </td></tr>
                    `;
                }
            } catch (error) { console.error("Error cargando auditoría", error); }
        }

        function pintarTabla(datos) {
            const tbody = document.getElementById('tabla-auditoria');
            tbody.innerHTML = '';

            if(datos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No hay registros de auditoría recientes.</td></tr>';
                return;
            }

            datos.forEach(a => {
                // Formatear Fecha (Ej. 17/04/2026 - 15:30:20)
                const fechaObj = new Date(a.fecha);
                const fechaStr = fechaObj.toLocaleDateString('es-PE') + ' - ' + fechaObj.toLocaleTimeString('es-PE');
                
                // Darle colores a las etiquetas según la gravedad de la acción
                let colorInsignia = 'bg-secondary';
                const accion = a.accion.toUpperCase();
                
                if (accion.includes('ELIMINAR') || accion.includes('BORRAR')) colorInsignia = 'bg-danger';
                else if (accion.includes('CANJE') || accion.includes('VIP')) colorInsignia = 'bg-warning text-dark';
                else if (accion.includes('LOGIN') || accion.includes('SESIÓN')) colorInsignia = 'bg-info text-dark';
                else if (accion.includes('CAJA')) colorInsignia = 'bg-success';

                tbody.innerHTML += `
                    <tr>
                        <td class="text-muted px-4" style="font-family: monospace; font-size: 13px;">${fechaStr}</td>
                        <td class="fw-bold text-white px-4">👤 ${a.usuario || 'Sistema'}</td>
                        <td class="px-4">
                            <span class="badge ${colorInsignia} px-2 py-1 shadow-sm">${accion}</span>
                        </td>
                        <td class="text-light opacity-75 px-4">${a.detalles}</td>
                    </tr>
                `;
            });
        }

        function filtrarAuditoria() {
            const txt = document.getElementById('buscador').value.toLowerCase();
            const filtrados = listaAuditoria.filter(a => 
                (a.usuario && a.usuario.toLowerCase().includes(txt)) || 
                a.accion.toLowerCase().includes(txt) ||
                a.detalles.toLowerCase().includes(txt)
            );
            pintarTabla(filtrados);
        }

        cargarAuditoria();
    </script>
</body>
</html>
