<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Club VIP | La Esquina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="icon" href="/logo.png">
    
    <style>
        /* Estilos específicos para las medallas VIP */
        .nivel-bronce { background: rgba(205, 127, 50, 0.15); color: #cd7f32; border: 1px solid rgba(205, 127, 50, 0.5); }
        .nivel-plata { background: rgba(192, 192, 192, 0.15); color: #c0c0c0; border: 1px solid rgba(192, 192, 192, 0.5); }
        .nivel-oro { background: rgba(212, 175, 55, 0.2); color: #D4AF37; border: 1px solid #D4AF37; font-weight: 900; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        
        .caja-afiliacion {
            background: linear-gradient(145deg, #1a170b, #050505);
            border: 1px solid #D4AF37;
            box-shadow: 0 10px 30px rgba(212,175,55,0.1);
        }
    </style>
</head>
<body class="text-light">
    
    <div id="toast">✅ Acción realizada</div>
    
    <div id="overlay-sidebar" class="overlay-mobile" onclick="cerrarMenuMovil()"></div>

    <nav class="sidebar">
        <div class="text-center mb-4">
            <img src="/logo.png" style="max-width: 150px;" alt="La Esquina">
        </div>
        
        <div class="d-flex flex-column flex-grow-1 mt-3">
            <a href="/dashboard.html" class="nav-item-vip">🎱 Control de Mesas</a>
            <a href="/cocina.html" class="nav-item-vip" target="_blank">👨‍🍳 Pantalla Cocina</a>
            <a href="/inventario.html" class="nav-item-vip">📦 Inventario</a>
            <a href="/clientes.html" class="nav-item-vip active">👑 Club La Esquina</a> <a href="/reportes.html" class="nav-item-vip">📈 Analytics (BI)</a>
            <a href="/cierre_caja.html" class="nav-item-vip">🔒 Cerrar Caja</a>
            <a href="/auditoria.html" class="nav-item-vip text-danger opacity-75">🕵️‍♂️ Auditoría</a>
            <a href="/empleados.html" class="nav-item-vip">👥 Empleados</a>
        </div>
        
        <a href="/logout" class="btn-logout-sidebar mt-4">🚪 CERRAR SESIÓN</a>
    </nav>

    <main class="main-content" style="padding: 30px;">
        
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3 border-bottom pb-3" style="border-color: rgba(212,175,55,0.3) !important;">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-warning d-md-none shadow-sm fw-bold px-3 py-2 text-dark" onclick="abrirMenuMovil()">
                    ☰ MENÚ
                </button>
                <h4 class="fw-bold mb-0 text-white" style="letter-spacing: 1px;">👑 Club La Esquina (VIP)</h4>
            </div>
            
            <button class="btn btn-outline-warning fw-bold shadow-sm" onclick="abrirGestorBeneficios()">
                ⚙️ CONFIGURAR BENEFICIOS
            </button>
        </div>

        <div class="caja-afiliacion p-4 rounded-4 mb-4">
            <h6 class="text-warning fw-bold mb-3">➕ Inscribir Nuevo Socio</h6>
            <div class="row g-3 align-items-end">
                <div class="col-12 col-md-3">
                    <label class="text-muted small fw-bold mb-1">NOMBRE DEL SOCIO</label>
                    <input type="text" id="cli-nombre" class="form-control bg-dark text-white border-warning" placeholder="Ej. Carlos Mendoza">
                </div>
                <div class="col-12 col-md-3">
                    <label class="text-muted small fw-bold mb-1">TELÉFONO (WhatsApp)</label>
                    <input type="text" id="cli-telefono" class="form-control bg-dark text-white border-secondary" placeholder="Ej. 999888777">
                </div>
                <div class="col-12 col-md-3">
                    <label class="text-muted small fw-bold mb-1">PIN DE SEGURIDAD (4 dígitos)</label>
                    <input type="password" id="cli-pin" class="form-control bg-dark text-white border-secondary" placeholder="Ej. 1234" maxlength="4">
                </div>
                <div class="col-12 col-md-3">
                    <button class="btn btn-warning w-100 fw-bold shadow-sm py-2 text-dark" onclick="registrarCliente()">
                        AFILIAR SOCIO
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <input type="text" id="buscador" class="form-control bg-dark text-white border-secondary shadow-sm" 
                   placeholder="🔍 Buscar socio por nombre o teléfono..." onkeyup="filtrarClientes()">
        </div>

        <div class="card bg-dark shadow-lg" style="border-radius: 12px; overflow: hidden; border: 1px solid #333;">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0 align-middle" style="border-collapse: separate; border-spacing: 0;">
                        <thead style="background: linear-gradient(145deg, #1a170b, #050505);">
                            <tr>
                                <th class="py-3 px-4 text-warning" style="border-bottom: 2px solid #D4AF37;">SOCIO</th>
                                <th class="py-3 px-4 text-warning" style="border-bottom: 2px solid #D4AF37;">TELÉFONO</th>
                                <th class="py-3 px-4 text-warning text-center" style="border-bottom: 2px solid #D4AF37;">SELLOS ACUMULADOS</th>
                                <th class="py-3 px-4 text-warning text-center" style="border-bottom: 2px solid #D4AF37;">NIVEL ACTUAL</th>
                                <th class="py-3 px-4 text-warning text-center" style="border-bottom: 2px solid #D4AF37;">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-clientes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modal-beneficios" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-dark border-warning" style="border-width: 2px;">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title text-warning fw-bold">⚙️ Gestor de Beneficios</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="d-flex gap-2 mb-3">
                            <select id="ben-nivel" class="form-select bg-black text-white border-secondary" style="width: 30%;">
                                <option value="Bronce">Bronce</option>
                                <option value="Plata">Plata</option>
                                <option value="Oro">Oro</option>
                            </select>
                            <input type="text" id="ben-desc" class="form-control bg-black text-white border-secondary" placeholder="Ej: 10% dcto en piqueos" style="width: 70%;">
                        </div>
                        <button class="btn btn-warning w-100 fw-bold text-dark mb-4" onclick="guardarBeneficio()">➕ Agregar Beneficio</button>
                        
                        <div id="lista-beneficios-admin" class="bg-black p-2 rounded-3 border border-secondary" style="max-height: 250px; overflow-y: auto;">
                            </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/alertas.js"></script>
    
    <script>
        let listaClientesGlobal = [];

        // --- SISTEMA DE MENÚ MÓVIL ---
        function abrirMenuMovil() {
            document.querySelector('.sidebar').classList.add('abierto-movil');
            document.getElementById('overlay-sidebar').classList.add('activo');
        }
        function cerrarMenuMovil() {
            document.querySelector('.sidebar').classList.remove('abierto-movil');
            document.getElementById('overlay-sidebar').classList.remove('activo');
        }

        // --- GESTIÓN DE CLIENTES ---
        async function cargarClientes() {
            try {
                const res = await fetch('/api/clientes');
                listaClientesGlobal = await res.json();
                pintarTabla(listaClientesGlobal);
            } catch (error) { console.error("Error cargando CRM:", error); }
        }

        function pintarTabla(clientes) {
            const tbody = document.getElementById('tabla-clientes');
            tbody.innerHTML = '';

            if(clientes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No hay socios registrados o no coinciden con la búsqueda.</td></tr>';
                return;
            }

            clientes.forEach(c => {
                let claseNivel = 'nivel-bronce';
                if(c.nivel.includes('Plata')) claseNivel = 'nivel-plata';
                if(c.nivel.includes('Oro')) claseNivel = 'nivel-oro';

                const canjeados = c.premios_canjeados || 0;
                const premiosDisponibles = Math.floor(c.sellos / 10) - canjeados;
                
                let btnCanje = '';
                if (premiosDisponibles > 0) {
                    btnCanje = `<button class="btn btn-sm btn-outline-warning fw-bold shadow-sm" onclick="canjearPremio(${c.id}, '${c.nombre}')" title="Canjear recompensa">🎁 Canjear (${premiosDisponibles})</button>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold text-white px-4">${c.nombre}</td>
                        <td class="text-muted px-4">${c.telefono || '-'}</td>
                        <td class="text-center px-4">
                            <span class="fs-5 fw-bold text-white">${c.sellos}</span> 
                        </td>
                        <td class="text-center px-4">
                            <span class="badge px-3 py-2 text-uppercase ${claseNivel}">${c.nivel}</span>
                        </td>
                        <td class="px-4">
                            <div class="d-flex gap-2 justify-content-center">
                                <button class="btn btn-sm btn-warning fw-bold text-dark shadow-sm" onclick="sumarSello(${c.id}, '${c.nombre}')" title="Sumar visita">⭐ +1 Sello</button>
                                <button class="btn btn-sm btn-outline-success fw-bold shadow-sm" onclick="enviarPromo('${c.nombre}', '${c.telefono}')" title="Enviar WhatsApp">📲 Promo</button>
                                ${btnCanje} 
                                
                                <button class="btn btn-sm btn-outline-danger fw-bold shadow-sm border-0" onclick="eliminarCliente(${c.id})" title="Dar de baja">
                                    🗑️
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

            

        function filtrarClientes() {
            const txt = document.getElementById('buscador').value.toLowerCase();
            const filtrados = listaClientesGlobal.filter(c => 
                c.nombre.toLowerCase().includes(txt) || 
                (c.telefono && c.telefono.includes(txt))
            );
            pintarTabla(filtrados);
        }

        // --- ACCIONES CRUD ---
        async function registrarCliente() {
            const valNombre = document.getElementById('cli-nombre').value.trim();
            const valTelefono = document.getElementById('cli-telefono').value.trim();
            const valPin = document.getElementById('cli-pin').value.trim();

            if (!valNombre) return mostrarAlerta("El nombre del socio es obligatorio.", "warning");
            if (!valTelefono) return mostrarAlerta("El teléfono es obligatorio.", "warning");
            if (!valPin || valPin.length !== 4) return mostrarAlerta("El PIN debe tener exactamente 4 dígitos.", "warning");

            try {
                const res = await fetch('/api/clientes/nuevo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: valNombre, telefono: valTelefono, pin: valPin }) 
                });

                const data = await res.json();
                if (res.ok) {
                    mostrarToast(`Socio ${valNombre} registrado con éxito.`);
                    document.getElementById('cli-nombre').value = '';
                    document.getElementById('cli-telefono').value = '';
                    document.getElementById('cli-pin').value = '';
                    cargarClientes(); 
                } else {
                    mostrarAlerta(data.error || "Error al registrar", "error");
                }
            } catch (error) { mostrarAlerta("Error de conexión", "error"); }
        }
        
        // --- ELIMINAR SOCIO VIP ---
        async function eliminarCliente(id) {
            // 1. Candado de seguridad corporativo
            const confirmado = await mostrarConfirmacion(
                "⚠️ Dar de Baja", 
                "¿Estás seguro de que deseas eliminar a este socio VIP? Perderá todos sus sellos, nivel y recompensas acumuladas de forma irreversible."
            );
            
            if (confirmado) {
                try {
                    // 2. Disparo a la Base de Datos
                    const res = await fetch(`/api/clientes/${id}`, { 
                        method: 'DELETE' 
                    });
                    
                    if (res.ok) {
                        mostrarToast("🗑️ Socio eliminado del Club La Esquina");
                        cargarClientes(); // Recargamos la tabla en vivo
                    } else {
                        const data = await res.json();
                        mostrarAlerta(data.error || "No se pudo eliminar al socio.", "error");
                    }
                } catch (error) { 
                    mostrarAlerta("Error de conexión con el servidor.", "error"); 
                }
            }
        }

        async function sumarSello(id, nombre) {
            const confirmado = await mostrarConfirmacion("⭐ Sumar Sello", `¿Añadir un (1) sello a la tarjeta de ${nombre}?`);
            if (confirmado) {
                try {
                    const res = await fetch(`/api/clientes/${id}/sello`, { method: 'POST' });
                    if (res.ok) {
                        mostrarToast("✅ Sello añadido correctamente");
                        cargarClientes(); 
                    }
                } catch (error) { mostrarAlerta("Error al sumar", "error"); }
            }
        }

        async function canjearPremio(id, nombre) {
            const confirmado = await mostrarConfirmacion("🎁 Canjear Recompensa", `¿Confirmas que le vas a dar 1 Hora Gratis a ${nombre}?`);
            if (confirmado) {
                try {
                    const res = await fetch(`/api/clientes/${id}/canjear`, { method: 'POST' });
                    if (res.ok) {
                        mostrarToast("✅ Hora gratis aplicada.");
                        cargarClientes();
                    } else {
                        const data = await res.json();
                        mostrarAlerta(data.error || "No se pudo canjear.", "error");
                    }
                } catch (error) { mostrarAlerta("Error al conectar.", "error"); }
            }
        }

        function enviarPromo(nombre, telefono) {
            if (!telefono || telefono === '-') return mostrarAlerta("Este socio no tiene teléfono registrado.", "warning");
            let numeroLimpio = telefono.replace(/\D/g, ''); 
            if (numeroLimpio.length === 9 && numeroLimpio.startsWith('9')) numeroLimpio = '51' + numeroLimpio;

            const mensaje = `¡Hola ${nombre}! 👑 Te extrañamos en La Esquina del Billar. Hoy tenemos una promo exclusiva para nuestros socios VIP. ¡Ven a sumar sellos a tu tarjeta digital! 🎱🍻`;
            window.open(`https://wa.me/${numeroLimpio}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // --- GESTIÓN DE BENEFICIOS (ADMIN) ---
        function abrirGestorBeneficios() {
            const modal = new bootstrap.Modal(document.getElementById('modal-beneficios'));
            modal.show();
            cargarBeneficiosAdmin();
        }

        async function cargarBeneficiosAdmin() {
            try {
                const res = await fetch('/api/beneficios');
                const beneficios = await res.json();
                const lista = document.getElementById('lista-beneficios-admin');
                lista.innerHTML = '';
                
                beneficios.forEach(b => {
                    let color = b.nivel === 'Oro' ? '#D4AF37' : (b.nivel === 'Plata' ? '#c0c0c0' : '#cd7f32');
                    lista.innerHTML += `
                        <div class="d-flex justify-content-between align-items-center p-2 border-bottom border-secondary">
                            <div>
                                <span class="badge" style="background: transparent; color: ${color}; border: 1px solid ${color};">${b.nivel}</span>
                                <span class="text-light ms-2 small">${b.descripcion}</span>
                            </div>
                            <button class="btn btn-sm text-danger" onclick="eliminarBeneficio(${b.id})">🗑️</button>
                        </div>
                    `;
                });
            } catch (e) { console.error("Error cargando beneficios"); }
        }

        async function guardarBeneficio() {
            const nivel = document.getElementById('ben-nivel').value;
            const descripcion = document.getElementById('ben-desc').value.trim();
            if(!descripcion) return mostrarAlerta("Escribe una descripción", "warning");

            try {
                const res = await fetch('/api/beneficios', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nivel, descripcion })
                });
                if(res.ok) {
                    document.getElementById('ben-desc').value = '';
                    cargarBeneficiosAdmin();
                }
            } catch (e) { mostrarAlerta("Error", "error"); }
        }

        async function eliminarBeneficio(id) {
            try {
                await fetch(`/api/beneficios/${id}`, { method: 'DELETE' });
                cargarBeneficiosAdmin();
            } catch (e) { mostrarAlerta("Error", "error"); }
        }

        // Inicializar
        cargarClientes();
    </script>
</body>
</html>
