<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BI | La Esquina Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/dashboard.css?v=4">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .bi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-top: 25px; }
        .bi-card { 
            background: linear-gradient(145deg, #16181d 0%, #0a0a0c 100%); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 16px; padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            position: relative; overflow: hidden;
        }
        .bi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); }
        .bi-title { color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .bi-icon { background: rgba(212, 175, 55, 0.1); color: #D4AF37; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><img src="/logo.png" class="logo-img"></div>
        <div class="menu">
            <a href="/dashboard.html" class="menu-link">🎱 Control de Mesas</a>
            <a href="/inventario.html" class="menu-link">📦 Inventario</a>
            <a href="/clientes.html" class="menu-link">👑 Club La Esquina</a>
            <a href="#" class="menu-link active" style="color: #D4AF37; border-left-color: #D4AF37;">📈 Analytics (BI)</a>
            <a href="/cierre_caja.html" class="menu-link">🔒 Cerrar Caja</a>
            <a href="/auditoria.html" class="menu-link" style="color: var(--danger);">🕵️‍♂️ Auditoría</a>
            <a href="/empleados.html" class="menu-link">👥 Empleados</a>
        </div>
        <a href="/logout" class="menu-link link-logout-pc">🚪 Salir</a>
    </nav>

    <main class="main-content">
        <div class="page-title">📈 Business Intelligence <span style="color: #D4AF37;">La Esquina</span></div>
        <p style="color: var(--text-muted);">Métricas de rendimiento en tiempo real para toma de decisiones.</p>
        <div style="background: rgba(17, 17, 17, 0.8); border: 1px solid #D4AF37; padding: 15px; border-radius: 12px; margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <button class="btn-mesa" style="padding: 8px 15px; font-size: 13px; background: transparent; border: 1px solid #444; color: #ccc;" onclick="filtrarRapido(0)">Hoy</button>
            <button class="btn-mesa" style="padding: 8px 15px; font-size: 13px; background: transparent; border: 1px solid #444; color: #ccc;" onclick="filtrarRapido(7)">7 Días</button>
            <button class="btn-mesa" style="padding: 8px 15px; font-size: 13px; background: transparent; border: 1px solid #444; color: #ccc;" onclick="filtrarRapido(30)">30 Días</button>
            <button class="btn-mesa" style="padding: 8px 15px; font-size: 13px; background: transparent; border: 1px solid #444; color: #ccc;" onclick="cargarBI()">Histórico Total</button>
            
            <div style="width: 1px; height: 30px; background: #444; margin: 0 10px;"></div>
            
            <input type="date" id="f-inicio" style="background: #0a0a0c; color: #fff; border: 1px solid #D4AF37; padding: 8px 12px; border-radius: 6px; font-family: inherit;">
            <span style="color: #888; font-size: 13px;">hasta</span>
            <input type="date" id="f-fin" style="background: #0a0a0c; color: #fff; border: 1px solid #D4AF37; padding: 8px 12px; border-radius: 6px; font-family: inherit;">
            
            <button class="btn-mesa" style="background: #D4AF37; color: #000; padding: 8px 20px; font-size: 13px; font-weight: 900; margin-left: auto;" onclick="filtrarRangoCustom()">🔍 APLICAR FILTRO</button>
        </div>

        <div class="bi-grid">
            <div class="bi-card">
                <div class="bi-title">Rendimiento por Mesa <span class="bi-icon">🎱</span></div>
                <canvas id="chartMesas" height="200"></canvas>
            </div>

            <div class="bi-card">
                <div class="bi-title">Top 5 Productos Estrella <span class="bi-icon">🍺</span></div>
                <canvas id="chartProductos" height="200"></canvas>
            </div>

            <div class="bi-card">
                <div class="bi-title">Flujo de Caja por Canal <span class="bi-icon">💳</span></div>
                <canvas id="chartPagos" height="200"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Configuración Global y Variables de Memoria para los gráficos
        Chart.defaults.color = '#888';
        Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
        const colorOro = '#D4AF37'; const colorOroTransparente = 'rgba(212, 175, 55, 0.4)';
        const colorVerde = '#2ecc71'; const colorMorado = '#8e44ad'; const colorAzul = '#2980b9';

        let chartMesasInst = null;
        let chartProdInst = null;
        let chartPagosInst = null;

        // 1. Motor de consulta (Ahora recibe fechas opcionales)
        async function cargarBI(inicio = null, fin = null) {
            try {
                let url = '/api/analytics/dashboard';
                if (inicio && fin) url += `?inicio=${inicio}&fin=${fin}`;

                const res = await fetch(url);
                const data = await res.json();

                if (data.error) return alert("Error al cargar los datos.");

                renderizarGraficoMesas(data.mesas);
                renderizarGraficoProductos(data.productos);
                renderizarGraficoPagos(data.metodos);
            } catch (error) { console.error("Error al cargar BI:", error); }
        }

        // 2. Lógica de Botones Rápidos
        function filtrarRapido(dias) {
            const hoy = new Date();
            const fechaFin = hoy.toISOString().split('T')[0];
            
            const fechaInicioObj = new Date();
            fechaInicioObj.setDate(hoy.getDate() - dias);
            const fechaInicio = fechaInicioObj.toISOString().split('T')[0];

            document.getElementById('f-inicio').value = fechaInicio;
            document.getElementById('f-fin').value = fechaFin;
            cargarBI(fechaInicio, fechaFin);
        }

        // 3. Lógica del Botón de Búsqueda Personalizada
        function filtrarRangoCustom() {
            const inicio = document.getElementById('f-inicio').value;
            const fin = document.getElementById('f-fin').value;
            if (!inicio || !fin) return alert("Por favor, selecciona fecha de inicio y fin.");
            if (inicio > fin) return alert("La fecha de inicio no puede ser mayor a la final.");
            cargarBI(inicio, fin);
        }

        // 4. Renderizadores con destrucción de memoria
        function renderizarGraficoMesas(datos) {
            if (chartMesasInst) chartMesasInst.destroy();
            const labels = datos.length > 0 ? datos.map(d => `Mesa ${d.numero_mesa}`) : ['Sin datos'];
            const valores = datos.length > 0 ? datos.map(d => parseFloat(d.recaudacion)) : [0];

            chartMesasInst = new Chart(document.getElementById('chartMesas'), {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Ingresos (S/)', data: valores, backgroundColor: colorOroTransparente, borderColor: colorOro, borderWidth: 2, borderRadius: 6 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#222' } }, x: { grid: { display: false } } } }
            });
        }

        function renderizarGraficoProductos(datos) {
            if (chartProdInst) chartProdInst.destroy();
            const labels = datos.length > 0 ? datos.map(d => d.nombre) : ['Sin datos'];
            const valores = datos.length > 0 ? datos.map(d => parseInt(d.total_vendido)) : [1]; // El 1 es para que el anillo no desaparezca vacío

            chartProdInst = new Chart(document.getElementById('chartProductos'), {
                type: 'doughnut',
                data: { labels, datasets: [{ data: valores, backgroundColor: datos.length > 0 ? [colorOro, '#e5c158', '#b5952f', '#8c7324', '#594917'] : ['#222'], borderWidth: 0, hoverOffset: 10 }] },
                options: { responsive: true, cutout: '70%', plugins: { legend: { position: 'right', labels: { color: '#ccc' } } } }
            });
        }

        function renderizarGraficoPagos(datos) {
            if (chartPagosInst) chartPagosInst.destroy();
            const labels = datos.length > 0 ? datos.map(d => d.metodo_pago) : ['Sin datos'];
            const valores = datos.length > 0 ? datos.map(d => parseFloat(d.monto)) : [0];

            chartPagosInst = new Chart(document.getElementById('chartPagos'), {
                type: 'polarArea',
                data: { labels, datasets: [{ data: valores, backgroundColor: datos.length > 0 ? [colorVerde, colorMorado, colorAzul] : ['#222'], borderColor: '#111', borderWidth: 3 }] },
                options: { responsive: true, scales: { r: { grid: { color: '#333' }, ticks: { display: false } } }, plugins: { legend: { position: 'bottom' } } }
            });
        }

        // Iniciar el motor al abrir la página con todo el historial
        document.addEventListener("DOMContentLoaded", () => cargarBI());
    </script>
</body>
</html>
