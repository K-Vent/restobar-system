<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Esquina - Carta Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════ */
        :root {
            --bg-main: #050505;
            --bg-card: rgba(20, 20, 22, 0.8);
            --bg-elevated: #0a0a0c;
            --gold: #D4AF37;
            --gold-hover: #e5c158;
            --gold-glow: 0 0 25px rgba(212,175,55,0.3);
            --success: #00d26a;
            --danger: #ff4757;
            --info: #00b4d8;
            --text-main: #ffffff;
            --text-muted: #8a8f98;
            --border: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(212,175,55,0.3);
        }

        /* ═══════════════════════════════════════════
           GLOBAL RESET & BASE
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 100px;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ═══════════════════════════════════════════
           AMBIENT BACKGROUND — slow shifting gradient
           ═══════════════════════════════════════════ */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%,  rgba(212,175,55,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.04) 0%, transparent 50%),
                radial-gradient(ellipse 90% 60% at 50% 50%,  rgba(10,10,12,1)     0%, var(--bg-main) 100%);
            animation: ambientShift 12s ease-in-out infinite alternate;
        }

        @keyframes ambientShift {
            0%   { opacity: 0.7; filter: hue-rotate(0deg); }
            50%  { opacity: 1;   filter: hue-rotate(5deg); }
            100% { opacity: 0.8; filter: hue-rotate(-3deg); }
        }

        /* Subtle noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ═══════════════════════════════════════════
           HEADER & NAVIGATION
           ═══════════════════════════════════════════ */
        .header-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.88);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        }

        /* Shimmer gradient border-bottom */
        .header-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(212,175,55,0.0) 10%,
                rgba(212,175,55,0.6) 30%,
                var(--gold) 50%,
                rgba(212,175,55,0.6) 70%,
                rgba(212,175,55,0.0) 90%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: shimmerBorder 4s ease-in-out infinite;
        }

        @keyframes shimmerBorder {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .logo-wrapper {
            text-align: center;
            padding: 22px 0 6px 0;
        }

        .logo {
            width: 110px;
            filter: drop-shadow(0 4px 20px rgba(212,175,55,0.25));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo:active {
            transform: scale(0.95);
        }

        /* Subtitle under logo */
        .header-subtitle {
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.7;
            margin-top: 4px;
            margin-bottom: 2px;
        }

        /* ═══════════════════════════════════════════
           CATEGORY TABS
           ═══════════════════════════════════════════ */
        .category-tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 14px 20px 16px 20px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 22px;
            border-radius: 50px;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            display: flex;
            align-items: center;
            gap: 7px;
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            opacity: 0;
            background: radial-gradient(circle at center, rgba(212,175,55,0.15), transparent 70%);
            transition: opacity 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
            border-color: rgba(255,255,255,0.15);
            background: rgba(255, 255, 255, 0.07);
        }

        .tab-btn:hover::before {
            opacity: 1;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--gold) 0%, #c49b2d 100%);
            color: #0a0a0c;
            border-color: var(--gold);
            box-shadow:
                var(--gold-glow),
                0 2px 8px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transform: scale(1.06);
            font-weight: 800;
        }

        .tab-btn.active::before { opacity: 0; }

        .tab-btn:active {
            transform: scale(0.97);
        }

        /* ═══════════════════════════════════════════
           PRODUCT CONTAINER
           ═══════════════════════════════════════════ */
        .container {
            padding: 24px 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ═══════════════════════════════════════════
           PRODUCT CARDS
           ═══════════════════════════════════════════ */
        .producto-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--gold);
            border-radius: 16px;
            padding: 20px 20px 20px 22px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow:
                0 4px 16px rgba(0,0,0,0.25),
                0 0 0 0 rgba(212,175,55,0);
            opacity: 0;
            transform: translateY(18px);
            animation: cardSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.25s ease,
                        border-color 0.25s ease;
        }

        .producto-card:hover {
            transform: translateY(-2px);
            box-shadow:
                0 8px 28px rgba(0,0,0,0.35),
                0 0 0 1px rgba(212,175,55,0.08);
            border-left-color: var(--gold-hover);
        }

        .producto-card:active {
            transform: scale(0.985);
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ═══════════════════════════════════════════
           PRODUCT INFO
           ═══════════════════════════════════════════ */
        .producto-info {
            flex-grow: 1;
            min-width: 0;
        }

        .producto-nombre {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.2px;
            line-height: 1.35;
            margin-bottom: 5px;
        }

        .producto-cat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .producto-cat-label::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0.6;
        }

        /* ═══════════════════════════════════════════
           PRICE BADGES
           ═══════════════════════════════════════════ */
        .producto-precio {
            font-size: 18px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            color: var(--gold);
            background: rgba(212,175,55,0.08);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(212,175,55,0.15);
            white-space: nowrap;
            flex-shrink: 0;
            text-shadow: 0 0 20px rgba(212,175,55,0.2);
            animation: pricePop 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: scale(0.85);
        }

        @keyframes pricePop {
            0%   { opacity: 0; transform: scale(0.85); }
            60%  { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ═══════════════════════════════════════════
           LOADING & EMPTY STATES
           ═══════════════════════════════════════════ */
        .loading-box {
            text-align: center;
            color: var(--text-muted);
            margin-top: 80px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeInUp 0.6s ease-out;
        }

        .loading-box::before {
            content: '🎱';
            font-size: 52px;
            display: block;
            animation: billiardBounce 1.8s cubic-bezier(0.36, 0, 0.66, -0.56) infinite;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
        }

        @keyframes billiardBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25%      { transform: translateY(-18px) rotate(8deg); }
            50%      { transform: translateY(0) rotate(0deg); }
            75%      { transform: translateY(-10px) rotate(-5deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════════
           FLOATING FOOTER
           ═══════════════════════════════════════════ */
        .powered-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
            text-align: center;
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(138, 143, 152, 0.6);
            background: linear-gradient(to top, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0.7) 70%, transparent 100%);
            pointer-events: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .powered-footer span {
            color: var(--gold);
            font-weight: 700;
            opacity: 0.8;
        }

        /* ═══════════════════════════════════════════
           SCROLLBAR STYLING (desktop)
           ═══════════════════════════════════════════ */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212,175,55,0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212,175,55,0.4);
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 380px) {
            .container { padding: 16px 14px; }
            .producto-card { padding: 16px 16px 16px 18px; }
            .producto-nombre { font-size: 15px; }
            .producto-precio { font-size: 16px; padding: 8px 12px; }
            .tab-btn { padding: 8px 16px; font-size: 12px; }
        }

        /* Respect reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-wrapper">
            <img src="/logo.png" alt="La Esquina" class="logo">
            <div class="header-subtitle">Carta Digital</div>
        </div>
        <div class="category-tabs" id="tabs-container">
            </div>
    </div>

    <div class="container" id="menu-container">
        <div class="loading-box">Preparando la carta...</div>
    </div>

    <!-- Floating footer -->
    <div class="powered-footer">
        Powered by <span>La Esquina</span>
    </div>

    <script>
        let todosLosProductos = [];
        let categoriasUnicas = [];

        // Íconos visuales para las pestañas
        const iconosCat = { 
            'Cervezas': '🍺', 
            'Tragos': '🍹', 
            'Cócteles': '🍸', 
            'Comida': '🍔', 
            'Piqueos': '🍟',
            'General': '✨',
            'Otros': '✨' 
        };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/menu/publico');
                todosLosProductos = await res.json();
                
                const container = document.getElementById('menu-container');

                if(todosLosProductos.length === 0) {
                    container.innerHTML = '<div class="loading-box">Aún no hay productos en stock. Vuelve pronto.</div>';
                    return;
                }

                // 1. Extraer categorías únicas
                const catSet = new Set();
                todosLosProductos.forEach(p => catSet.add(p.categoria || 'General'));
                categoriasUnicas = Array.from(catSet).sort();

                // Asegurar que "Todas" sea la primera opción
                categoriasUnicas.unshift('Todas');

                // 2. Dibujar las pestañas
                dibujarTabs();

                // 3. Mostrar todos los productos por defecto
                filtrarPorCategoria('Todas');

            } catch (e) {
                document.getElementById('menu-container').innerHTML = 
                    '<div class="loading-box" style="color:#ff4757;">Error al cargar el menú. Por favor, avise al personal.</div>';
            }
        });

        function dibujarTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';

            categoriasUnicas.forEach((cat, index) => {
                const icono = cat === 'Todas' ? '📜' : (iconosCat[cat] || '✨');
                const activeClass = index === 0 ? 'active' : '';
                
                tabsContainer.innerHTML += `
                    <button class="tab-btn ${activeClass}" onclick="filtrarPorCategoria('${cat}', this)">
                        ${icono} ${cat}
                    </button>
                `;
            });
        }

        function filtrarPorCategoria(categoriaSeleccionada, botonHTML = null) {
            // Actualizar estilo visual de los botones
            if (botonHTML) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                botonHTML.classList.add('active');
                
                // Centrar el botón presionado en dispositivos móviles
                botonHTML.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // Filtrar el arreglo de productos
            const productosFiltrados = categoriaSeleccionada === 'Todas' 
                ? todosLosProductos 
                : todosLosProductos.filter(p => (p.categoria || 'General') === categoriaSeleccionada);

            // Dibujar los productos
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            productosFiltrados.forEach((p, index) => {
                container.innerHTML += `
                    <div class="producto-card" style="animation-delay: ${index * 0.05}s">
                        <div class="producto-info">
                            <div class="producto-nombre">${p.nombre}</div>
                            <div class="producto-cat-label">${p.categoria || 'General'}</div>
                        </div>
                        <div class="producto-precio" style="animation-delay: ${index * 0.05 + 0.2}s">S/ ${parseFloat(p.precio_venta).toFixed(2)}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
