<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Club La Esquina - Socios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/css/dashboard.css?v=3">
    <style>
        .gold-text { color: #D4AF37; }
        .gold-border { border-color: #D4AF37; }
        .nivel-bronce { background: rgba(205, 127, 50, 0.1); color: #cd7f32; border: 1px solid rgba(205, 127, 50, 0.3); }
        .nivel-plata { background: rgba(192, 192, 192, 0.1); color: #c0c0c0; border: 1px solid rgba(192, 192, 192, 0.3); }
        .nivel-oro { background: rgba(212, 175, 55, 0.15); color: #D4AF37; border: 1px solid rgba(212, 175, 55, 0.5); font-weight: 900; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .btn-sello { background: rgba(212, 175, 55, 0.1); color: #D4AF37; border: 1px solid rgba(212, 175, 55, 0.4); padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-sello:hover { background: #D4AF37; color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><img src="/logo.png" class="logo-img"></div>
        <div class="menu">
            <a href="/dashboard.html" class="menu-link">🎱 Control de Mesas</a>
            <a href="/inventario.html" class="menu-link">📦 Inventario</a>
            <a href="#" class="menu-link active" style="color: #D4AF37; border-left-color: #D4AF37;">👑 Club La Esquina</a>
            <a href="/reportes.html" class="menu-link">📅 Historial</a>
            <a href="/empleados.html" class="menu-link">👥 Empleados</a>
            <a href="/cierre_caja.html" class="menu-link">🔒 Cerrar Caja</a>
        </div>
        <a href="/logout" class="menu-link link-logout-pc">🚪 Salir</a>
    </nav>

    <main class="main-content">
        <div class="page-title">👑 Club VIP <span class="gold-text">La Esquina</span></div>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Gestión de fidelización y recompensas para clientes frecuentes.</p>

        <div style="background: var(--bg-card); padding: 25px; border-radius: 16px; border: 1px solid #222; margin-bottom: 30px; display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div style="flex: 1; min-width: 200px;">
                <span style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase;">Nombre del Socio</span>
                <input type="text" id="cli-nombre" class="modal-input gold-border" placeholder="Ej. Carlos Mendoza">
            </div>
            <div style="flex: 1; min-width: 150px;">
                <span style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase;">Teléfono / WhatsApp</span>
                <input type="text" id="cli-telefono" class="modal-input" placeholder="Ej. 999888777">
            </div>
            <button class="btn-mesa btn-abrir" style="background: #D4AF37; color: #000; padding: 16px 25px; height: 52px; font-weight: 900;" onclick="registrarCliente()">➕ AFILIAR SOCIO</button>
        </div>

        <div style="background: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr>
                        <th style="padding: 16px 25px; background: #111; color: var(--text-muted); text-transform: uppercase; font-size: 12px;">Socio</th>
                        <th style="padding: 16px 25px; background: #111; color: var(--text-muted); text-transform: uppercase; font-size: 12px;">Teléfono</th>
                        <th style="padding: 16px 25px; background: #111; color: var(--text-muted); text-transform: uppercase; font-size: 12px;">Sellos Acumulados</th>
                        <th style="padding: 16px 25px; background: #111; color: var(--text-muted); text-transform: uppercase; font-size: 12px;">Nivel Actual</th>
                        <th style="padding: 16px 25px; background: #111; color: var(--text-muted); text-transform: uppercase; font-size: 12px;">Acción Rápida</th>
                    </tr>
                </thead>
                <tbody id="tabla-clientes"></tbody>
            </table>
        </div>
    </main>

    <script src="/js/alertas.js"></script>
    <script>
        async function cargarClientes() {
            try {
                const res = await fetch('/api/clientes');
                const clientes = await res.json();
                const tbody = document.getElementById('tabla-clientes');
                tbody.innerHTML = '';

                if(clientes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#555;">No hay socios registrados aún.</td></tr>';
                    return;
                }

                clientes.forEach(c => {
                    let claseNivel = 'nivel-bronce';
                    if(c.nivel.includes('Plata')) claseNivel = 'nivel-plata';
                    if(c.nivel.includes('Oro')) claseNivel = 'nivel-oro';

                    tbody.innerHTML += `
                        <tr style="border-bottom: 1px solid #1f222b; transition: 0.2s;">
                            <td style="padding: 16px 25px; font-weight: 800; color: white; font-size: 15px;">${c.nombre}</td>
                            <td style="padding: 16px 25px; color: var(--text-muted);">${c.telefono || '-'}</td>
                            <td style="padding: 16px 25px;">
                                <span style="font-size: 18px; font-weight: 900; color: #fff;">${c.sellos}</span> 
                                <span style="font-size: 12px; color: #666;">/ 10</span>
                            </td>
                            <td style="padding: 16px 25px;">
                                <span style="padding: 6px 12px; border-radius: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; ${claseNivel}">${c.nivel}</span>
                            </td>
                            <td style="padding: 16px 25px;">
                                <button class="btn-sello" onclick="sumarSello(${c.id}, '${c.nombre}')">⭐ Añadir Sello</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error("Error cargando CRM:", error); }
        }

        async function registrarCliente() {
            const nombre = document.getElementById('cli-nombre').value.trim();
            const telefono = document.getElementById('cli-telefono').value.trim();

            if (!nombre) return mostrarAlerta("El nombre del socio es obligatorio.", "warning");

            try {
                const res = await fetch('/api/clientes/nuevo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, telefono })
                });

                const data = await res.json();
                if (res.ok) {
                    mostrarAlerta(`Socio ${nombre} registrado con éxito.`, "success");
                    document.getElementById('cli-nombre').value = '';
                    document.getElementById('cli-telefono').value = '';
                    cargarClientes();
                } else {
                    mostrarAlerta(data.error || "Error al registrar", "error");
                }
            } catch (error) { mostrarAlerta("Error de conexión", "error"); }
        }

        async function sumarSello(id, nombre) {
            const confirmado = await mostrarConfirmacion("⭐ Sumar Sello", `¿Añadir un (1) sello de visita a la cuenta de ${nombre}?`);
            if (confirmado) {
                try {
                    const res = await fetch(`/api/clientes/${id}/sello`, { method: 'POST' });
                    if (res.ok) {
                        mostrarAlerta("Sello añadido correctamente", "success");
                        cargarClientes(); // Recargar para ver los nuevos puntos y nivel
                    }
                } catch (error) { mostrarAlerta("Error al sumar sello", "error"); }
            }
        }

        cargarClientes();
    </script>
</body>
</html>
