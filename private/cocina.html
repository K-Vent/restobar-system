<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KDS | Barra La Esquina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-card: #0a0a0a; }
        body { background-color: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* Reloj y Header */
        .kds-header { background: #000; border-bottom: 2px solid var(--gold); padding: 15px 30px; margin-bottom: 25px; }
        #reloj { font-size: 2rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(212,175,55,0.3); }

        /* Tarjeta de Comanda Premium */
        .comanda-card { 
            background: var(--dark-card); border: 1px solid #333; border-radius: 12px; 
            overflow: hidden; transition: transform 0.2s, border-color 0.2s;
            animation: fadeIn 0.4s ease-out; height: 100%; display: flex; flex-direction: column;
        }
        .comanda-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .comanda-header { 
            background: #111; padding: 12px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }
        .mesa-numero { font-size: 1.4rem; font-weight: 900; color: #fff; }
        .tiempo-pedido { font-size: 0.9rem; color: #888; font-weight: 600; }

        .comanda-body { padding: 15px; flex-grow: 1; }
        
        /* Items de Producto */
        .producto-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px 0;
            border-bottom: 1px solid #1a1a1a; 
        }
        .producto-item:last-child { border-bottom: none; }
        
        .cantidad-badge { 
            background: var(--gold); color: #000; font-weight: 900; 
            min-width: 35px; height: 35px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .producto-nombre { flex-grow: 1; font-weight: 600; color: #eee; font-size: 1.05rem; line-height: 1.2; }
        .producto-categoria { display: block; font-size: 0.7rem; letter-spacing: 1px; font-weight: 800; margin-top: 2px; }

        .btn-despachar { 
            background: #1b4332; color: #74c69d; border: none; width: 100%;
            padding: 15px; font-weight: 900; letter-spacing: 1px;
            transition: background 0.2s; border-top: 1px solid #2d6a4f;
        }
        .btn-despachar:hover { background: #2d6a4f; color: #fff; }

        /* Estados Vacíos */
        .empty-state { text-align: center; margin-top: 10vh; color: #444; }
        .empty-icon { font-size: 5rem; margin-bottom: 20px; opacity: 0.2; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header class="kds-header d-flex justify-content-between align-items-center">
        <div>
            <img src="/logo.png" alt="La Esquina" style="height: 45px;">
        </div>
        <div class="text-center">
            <span class="badge bg-outline-secondary small mb-1" style="color: #666; border: 1px solid #333;">MODO KDS - BARRA</span>
            <div id="reloj">00:00:00</div>
        </div>
        <button class="btn btn-sm btn-outline-warning fw-bold" onclick="probarSonido()">🔔 PROBAR SONIDO</button>
    </header>

    <div class="container-fluid px-4">
        <div id="contenedor-kds" class="row g-4">
            </div>
    </div>

    <audio id="campana" src="https://actions.google.com/sounds/v1/alarms/ding.ogg" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Reloj en tiempo real
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-PE');
        }, 1000);

        // ¡Corregido el nombre de la variable!
        let bloqueo_refresco = false; 
        
        const sonidoCampana = document.getElementById('campana');
        const socket = io();

        // 1. ESCUCHA DE WEBSOCKETS (CAMPANA Y ACTUALIZACIÓN)
        socket.on('campana_cocina', () => {
            sonidoCampana.currentTime = 0;
            sonidoCampana.play().catch(e => console.log("Audio en espera de interacción"));
            if (!bloqueo_refresco) cargarKDS(); 
        });

        socket.on('actualizar_cocina', () => {
            if (!bloqueo_refresco) cargarKDS();
        });

        function probarSonido() {
            sonidoCampana.play().catch(e => alert("Toca la pantalla una vez para habilitar sonidos."));
        }

        // 2. LÓGICA DE AGRUPACIÓN
        function agruparPorMesa(pedidos) {
            const agrupado = {};
            pedidos.forEach(p => {
                if (!agrupado[p.numero_mesa]) {
                    agrupado[p.numero_mesa] = {
                        mesa: p.numero_mesa,
                        horaMinima: p.hora,
                        items: []
                    };
                }
                agrupado[p.numero_mesa].items.push(p);
            });
            return Object.values(agrupado).sort((a, b) => a.mesa - b.mesa);
        }

        async function cargarKDS() {
            try {
                const res = await fetch('/api/kds/pendientes');
                const pedidosRaw = await res.json();
                const contenedor = document.getElementById('contenedor-kds');

                if (pedidosRaw.length === 0) {
                    contenedor.innerHTML = `
                        <div class="empty-state w-100">
                            <div class="empty-icon">🍷</div>
                            <h2 class="fw-bold">BARRA DESPEJADA</h2>
                            <p>No hay pedidos pendientes por ahora.</p>
                        </div>`;
                    return;
                }

                const comandas = agruparPorMesa(pedidosRaw);
                contenedor.innerHTML = comandas.map(comanda => {
                    const itemsHtml = comanda.items.map(item => {
                        const cat = item.categoria ? item.categoria.toUpperCase() : 'GENERAL';
                        const colorCat = (cat.includes('CERVEZA') || cat.includes('TRAGO')) ? '#0dcaf0' : '#ff4757';
                        
                        return `
                            <div class="producto-item">
                                <div class="cantidad-badge">${item.cantidad}</div>
                                <div class="producto-nombre">
                                    ${item.nombre}
                                    <span class="producto-categoria" style="color: ${colorCat}">${cat}</span>
                                </div>
                                <button class="btn btn-sm btn-outline-secondary" onclick="marcarEntregado(${item.id})">✔️</button>
                            </div>`;
                    }).join('');

                    return `
                        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                            <div class="comanda-card shadow">
                                <div class="comanda-header">
                                    <div class="mesa-numero">Mesa ${comanda.mesa}</div>
                                    <div class="tiempo-pedido">⏱️ ${comanda.horaMinima}</div>
                                </div>
                                <div class="comanda-body">
                                    ${itemsHtml}
                                </div>
                                <button class="btn-despachar" onclick="despacharMesaCompleta([${comanda.items.map(i => i.id).join(',')}])">
                                    🛎️ DESPACHAR TODO
                                </button>
                            </div>
                        </div>`;
                }).join('');

            } catch (error) {
                console.error("Error KDS:", error);
            }
        }

        async function marcarEntregado(id) {
            try {
                await fetch(`/api/kds/entregar/${id}`, { method: 'POST' });
            } catch (e) { console.error(e); }
        }

        // 3. OPTIMIZACIÓN: Despachar todo sin recargar 50 veces
        async function despacharMesaCompleta(ids) {
            bloqueo_refresco = true; // Bloqueamos el autorefresco del WebSocket temporalmente
            try {
                const promesas = ids.map(id => fetch(`/api/kds/entregar/${id}`, { method: 'POST' }));
                await Promise.all(promesas);
            } catch (error) {
                console.error(error);
            } finally {
                bloqueo_refresco = false;
                cargarKDS(); // Una sola recarga al final de todas las peticiones
            }
        }

        document.addEventListener('DOMContentLoaded', cargarKDS);
        setInterval(cargarKDS, 15000); // Fallback de seguridad cada 15s
    </script>
</body>
</html>
